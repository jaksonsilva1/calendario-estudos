<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
  <title>Calendário de Estudos GMM • Escala Profissional</title>
  <style>
    :root {
      --bg: #f7fafc;
      --card: #ffffff;
      --text: #111111;
      --muted: #6b7280;
      --border-light: #e5e7eb;
      --cell-bg: linear-gradient(180deg, #fff, #fbfdff);
      --cell-hover: #fefce8;
      --modal-bg: #ffffff;
      --input-bg: #ffffff;
      --input-border: #e5e7eb;
      --btn-secondary-bg: #ffffff;
      --btn-secondary-border: #e5e7eb;
      --btn-secondary-text: #111111;
      --delete-btn-bg: #fee2e2;
      --delete-btn-text: #b91c1c;
      --delete-btn-hover: #fecaca;
      --info-bg: #f1f5f9;
      --info-text: #334155;
      --stats-bg: #f8fafc;
      --scrollbar-track: #e2e8f0;
      --scrollbar-thumb: #cbd5e1;
      --scrollbar-thumb-hover: #94a3b8;
      --legend-bg: #f1f5f9;
    }

    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border-light: #334155;
      --cell-bg: linear-gradient(180deg, #1e293b, #0f172a);
      --cell-hover: #2d3a4f;
      --modal-bg: #1e293b;
      --input-bg: #0f172a;
      --input-border: #334155;
      --btn-secondary-bg: #334155;
      --btn-secondary-border: #475569;
      --btn-secondary-text: #e2e8f0;
      --delete-btn-bg: #450a0a;
      --delete-btn-text: #f87171;
      --delete-btn-hover: #7f1a1a;
      --info-bg: #1e293b;
      --info-text: #cbd5e1;
      --stats-bg: #0f172a;
      --scrollbar-track: #1e293b;
      --scrollbar-thumb: #334155;
      --scrollbar-thumb-hover: #475569;
      --legend-bg: #1e293b;
    }

    * {
      box-sizing: border-box;
    }

    /* ====================== SCROLLBAR PERSONALIZADA ====================== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--scrollbar-track);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--scrollbar-thumb-hover);
    }

    /* Para Firefox */
    * {
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
    }

    body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: var(--bg);
      margin: 0;
      padding: 16px;
      color: var(--text);
      transition: background 0.2s, color 0.2s;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 {
      font-size: 18px;
      margin: 0;
    }

    .controls {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* BANNER DE DESEMPENHO (resumo com indicadores globais) */
    .performance-banner {
      background: var(--card);
      border-radius: 16px;
      padding: 12px 18px;
      margin-bottom: 20px;
      border: 1px solid var(--border-light);
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      transition: all 0.2s;
    }

    .performance-stats {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.9rem;
    }

    .stats-numbers {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      font-weight: 500;
    }

    .stats-numbers span {
      color: var(--text);
      background: var(--info-bg);
      padding: 4px 10px;
      border-radius: 40px;
      font-size: 0.85rem;
    }

    .overall-percent {
      font-weight: 700;
      font-size: 1.2rem;
      background: var(--accent-bg, #eef2ff);
      padding: 4px 12px;
      border-radius: 40px;
      color: var(--accent-color, #2563eb);
    }

    button {
      background: var(--accent, #0f9d58);
      color: #fff;
      border: 0;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.1s;
      font-size: 13px;
    }

    .small {
      background: var(--btn-secondary-bg);
      color: var(--btn-secondary-text);
      border: 1px solid var(--btn-secondary-border);
      padding: 6px 10px;
    }

    .calendar {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
      transition: background 0.2s;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 10px;
    }

    .weekday {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      font-weight: 600;
      padding: 6px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .cell {
      aspect-ratio: 1 / 1;
      min-height: 0;
      border-radius: 10px;
      padding: 8px;
      background: var(--cell-bg);
      border: 1px solid var(--border-light);
      position: relative;
      transition: all 0.1s;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .cell:hover {
      background: var(--cell-hover);
      border-color: var(--accent, #0f9d58);
      transform: scale(1.02);
      z-index: 1;
    }

    .cell .date {
      position: absolute;
      top: 6px;
      left: 8px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
    }

    .events {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 24px;
      flex: 1;
      overflow-y: auto;
      max-height: calc(100% - 28px);
    }

    .events::-webkit-scrollbar {
      width: 3px;
    }
    
    .events::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .events::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 2px;
    }

    .event {
      display: inline-block;
      padding: 4px 6px;
      border-radius: 8px;
      color: #fff;
      font-size: 10px;
      max-width: 100%;
      white-space: normal;
      word-break: break-word;
      cursor: pointer;
      transition: transform 0.05s;
      line-height: 1.2;
      text-align: center;
      font-weight: 500;
      text-shadow: 0 1px 1px rgba(0,0,0,0.2);
    }

    .event:hover {
      transform: scale(0.98);
      filter: brightness(0.95);
    }

    .empty {
      opacity: 0.6;
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      text-align: center;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      color: var(--muted);
      font-size: 11px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .modal-back {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .modal {
      background: var(--modal-bg);
      padding: 20px;
      border-radius: 16px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 35px rgba(2, 6, 23, 0.4);
      transition: background 0.2s;
    }

    .modal h3 {
      margin: 0 0 12px 0;
      font-size: 1.2rem;
      color: var(--text);
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    label {
      font-weight: 500;
      font-size: 0.85rem;
      color: var(--text);
    }

    input[type="text"],
    input[type="number"],
    select,
    textarea {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
    }

    .stats-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .percentage {
      margin-top: 8px;
      padding: 10px;
      background: var(--stats-bg);
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
      font-weight: bold;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 12px;
    }

    #deleteBtn {
      background: var(--delete-btn-bg);
      color: var(--delete-btn-text);
      border: 1px solid var(--delete-btn-text);
    }

    #deleteBtn:hover {
      background: var(--delete-btn-hover);
    }

    @media (max-width: 768px) {
      body { padding: 12px; }
      .calendar { padding: 12px; }
      .weekday { font-size: 11px; }
      .grid { gap: 5px; }
      .cell { padding: 6px; }
      .cell .date { font-size: 10px; top: 5px; left: 6px; }
      .events { margin-top: 22px; gap: 3px; }
      .event { font-size: 9px; padding: 3px 5px; }
      .empty { font-size: 10px; }
      button { padding: 5px 8px; font-size: 12px; }
    }

    @media (max-width: 600px) {
      .grid { gap: 4px; }
      .cell .date { font-size: 9px; }
      .event { font-size: 8px; padding: 2px 4px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📚 Calendário de Estudos GMM • Escala Profissional</h1>
    <div class="controls">
      <button id="themeToggle" class="small">🌙 Modo escuro</button>
      <button id="prev" title="Mês anterior">◀</button>
      <div class="small" id="monthLabel"></div>
      <button id="next" title="Próximo mês">▶</button>
      <button id="today">📅 Hoje</button>
      <button id="export">📤 Exportar</button>
      <button id="importBtn" class="small">📂 Importar</button>
      <input type="file" id="importFile" accept=".json" style="display: none;" />
    </div>
  </header>

  <!-- BANNER DE DESEMPENHO (resumo com indicadores globais) -->
  <div class="performance-banner" id="performanceBanner">
    <div class="performance-stats">
      <div class="stats-numbers" id="globalStats">
        <!-- Preenchido via js -->
      </div>
      <div class="overall-percent" id="globalPercent">
        --
      </div>
    </div>
  </div>

  <div class="calendar">
    <div class="weekdays" id="weekdays"></div>
    <div class="grid" id="grid"></div>
    <div class="footer">
      <div>💡 Clique no dia para adicionar / clique no evento para editar</div>
      <div id="info"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-back" id="modalBack">
  <div class="modal" role="dialog" aria-modal="true">
    <h3 id="modalTitle">Adicionar Evento</h3>
    <div class="form-row">
      <label>📌 Título *</label>
      <input id="evTitle" type="text" placeholder="Ex: DP - Teoria do crime" autocomplete="off" />
    </div>
    <div class="form-row">
      <label>⏰ Horário (opcional)</label>
      <input id="evTime" type="text" placeholder="Ex: 19:00-21:00" />
    </div>
    <div class="stats-group">
      <div class="stat-field">
        <label>✅ Número de Acertos</label>
        <input id="evHits" type="number" min="0" value="0" />
      </div>
      <div class="stat-field">
        <label>❌ Número de Erros</label>
        <input id="evErrors" type="number" min="0" value="0" />
      </div>
    </div>
    <div class="percentage" id="percentageDisplay">
      📊 Percentual: 0%
    </div>
    <div class="modal-actions">
      <button id="deleteBtn" class="small" style="display:none">🗑️ Excluir</button>
      <button id="cancelBtn" class="small">Cancelar</button>
      <button id="saveBtn">💾 Salvar</button>
    </div>
  </div>
</div>

<script>
  // ====================== DOM elements ======================
  const weekdays = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'];
  const monthLabel = document.getElementById('monthLabel');
  const gridEl = document.getElementById('grid');
  const weekdaysRow = document.getElementById('weekdays');
  const modalBack = document.getElementById('modalBack');
  const modalTitle = document.getElementById('modalTitle');
  const evTitle = document.getElementById('evTitle');
  const evTime = document.getElementById('evTime');
  const evHits = document.getElementById('evHits');
  const evErrors = document.getElementById('evErrors');
  const percentageDisplay = document.getElementById('percentageDisplay');
  const saveBtn = document.getElementById('saveBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const deleteBtn = document.getElementById('deleteBtn');
  const info = document.getElementById('info');
  const themeToggle = document.getElementById('themeToggle');
  const importBtn = document.getElementById('importBtn');
  const importFile = document.getElementById('importFile');
  const globalStatsSpan = document.getElementById('globalStats');
  const globalPercentSpan = document.getElementById('globalPercent');

  let currentDate = new Date();
  let selectedDateKey = null;
  let editingEventId = null;

  // ====================== ESCALA DE CORES ======================
  function getColorByPercentage(percentage) {
    if (percentage < 70) return '#D32F2F';       // vermelho (<70%)
    if (percentage <= 74.99) return '#FBC02D';   // amarelo (70% – 74.99%)
    if (percentage <= 78.99) return '#388E3C';   // verde (75% – 78.99%)
    return '#1976D2';                            // azul (79% – 100%)
  }

  function calculatePercentage(hits, errors) {
    const total = hits + errors;
    if (total === 0) return 0;
    return (hits / total) * 100;
  }

  function updatePercentageDisplay() {
    const hits = parseInt(evHits.value) || 0;
    const errors = parseInt(evErrors.value) || 0;
    const percentage = calculatePercentage(hits, errors);
    const color = getColorByPercentage(percentage);
    percentageDisplay.innerHTML = `📊 Percentual: ${percentage.toFixed(1)}%`;
    percentageDisplay.style.backgroundColor = color + '20';
    percentageDisplay.style.color = color;
    percentageDisplay.style.borderLeft = `4px solid ${color}`;
  }

  // ====================== TEMA ======================
  function initTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
      document.body.classList.remove('dark');
      themeToggle.textContent = '🌙 Modo escuro';
    } else {
      document.body.classList.add('dark');
      localStorage.setItem('theme', 'dark');
      themeToggle.textContent = '☀️ Modo claro';
    }
  }

  function toggleTheme() {
    if (document.body.classList.contains('dark')) {
      document.body.classList.remove('dark');
      localStorage.setItem('theme', 'light');
      themeToggle.textContent = '🌙 Modo escuro';
    } else {
      document.body.classList.add('dark');
      localStorage.setItem('theme', 'dark');
      themeToggle.textContent = '☀️ Modo claro';
    }
  }
  themeToggle.addEventListener('click', toggleTheme);

  // ====================== STORAGE ======================
  function loadEvents() {
    try {
      return JSON.parse(localStorage.getItem('calEvents') || '{}');
    } catch(e) {
      return {};
    }
  }
  function saveEvents(eventsObj) {
    localStorage.setItem('calEvents', JSON.stringify(eventsObj));
  }

  // Dados iniciais com exemplos
  if (!localStorage.getItem('calEvents')) {
    const sample = {};
    const today = new Date();
    const y = today.getFullYear();
    const m = today.getMonth();
    const pad = (n) => String(n).padStart(2, '0');
    const key = (day) => `${y}-${pad(m+1)}-${pad(day)}`;
    sample[key(2)] = [{ id: Date.now()+1, title: 'DP - Teoria do Crime', time: '19:00', hits: 12, errors: 15 }];
    sample[key(4)] = [{ id: Date.now()+2, title: 'DH - ECI', time: '19:00', hits: 18, errors: 12 }];
    sample[key(6)] = [{ id: Date.now()+3, title: 'Lei 8.112', time: '09:00', hits: 28, errors: 12 }];
    sample[key(10)] = [{ id: Date.now()+4, title: 'CF - Art. 5º', time: '19:00', hits: 30, errors: 10 }];
    sample[key(13)] = [{ id: Date.now()+5, title: 'ADM - Licitações', time: '14:30', hits: 40, errors: 10 }];
    sample[key(15)] = [{ id: Date.now()+6, title: 'REVISÃO GERAL', time: '', hits: 85, errors: 15 }];
    saveEvents(sample);
  }

  // ====================== RENDER ======================
  function formatMonthYear(d) {
    return d.toLocaleString('pt-BR', { month: 'long', year: 'numeric' }).replace(/^\w/, l => l.toUpperCase());
  }

  function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
  function endOfMonth(d) { return new Date(d.getFullYear(), d.getMonth() + 1, 0); }

  // Atualiza o banner de desempenho global
  function updateGlobalPerformanceBanner() {
    const eventsMap = loadEvents();
    const allEvents = Object.values(eventsMap).flat();
    let totalTopics = allEvents.length;
    let totalHits = 0, totalErrors = 0;
    allEvents.forEach(ev => {
      totalHits += ev.hits || 0;
      totalErrors += ev.errors || 0;
    });
    const totalQuestions = totalHits + totalErrors;
    const overallPercentage = totalQuestions > 0 ? ((totalHits / totalQuestions) * 100).toFixed(1) : 0;
    let percentColor = getColorByPercentage(parseFloat(overallPercentage));
    globalStatsSpan.innerHTML = `
      <span>📊 ${totalTopics} tópico(s)</span>
      <span>✅ ${totalHits} acertos</span>
      <span>❌ ${totalErrors} erros</span>
    `;
    globalPercentSpan.innerHTML = `📈 ${overallPercentage}%`;
    globalPercentSpan.style.backgroundColor = percentColor + '30';
    globalPercentSpan.style.color = percentColor;
    globalPercentSpan.style.borderRadius = '40px';
    info.innerHTML = `📊 ${totalTopics} tópico(s) | ✅ ${totalHits} acertos | ❌ ${totalErrors} erros | 📈 ${overallPercentage}%`;
  }

  function render() {
    gridEl.innerHTML = '';
    monthLabel.textContent = formatMonthYear(currentDate);
    const firstDay = startOfMonth(currentDate);
    const lastDay = endOfMonth(currentDate);
    const startWeekday = firstDay.getDay();
    const totalDays = lastDay.getDate();
    const eventsMap = loadEvents();

    // células anteriores
    const prevMonthLastDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), 0).getDate();
    for (let i = 0; i < startWeekday; i++) {
      const dayNum = prevMonthLastDate - startWeekday + 1 + i;
      const emptyCell = document.createElement('div');
      emptyCell.className = 'cell';
      emptyCell.style.opacity = '0.4';
      const dateSpan = document.createElement('div');
      dateSpan.className = 'date';
      dateSpan.textContent = dayNum;
      emptyCell.appendChild(dateSpan);
      gridEl.appendChild(emptyCell);
    }

    // dias do mês
    for (let d = 1; d <= totalDays; d++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const dateSpan = document.createElement('div');
      dateSpan.className = 'date';
      dateSpan.textContent = d;
      cell.appendChild(dateSpan);

      const key = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayEvents = eventsMap[key] || [];
      const eventsContainer = document.createElement('div');
      eventsContainer.className = 'events';

      if (dayEvents.length === 0) {
        const hint = document.createElement('div');
        hint.className = 'empty';
        hint.textContent = '+';
        eventsContainer.appendChild(hint);
      } else {
        dayEvents.forEach(ev => {
          const evDiv = document.createElement('div');
          evDiv.className = 'event';
          
          const hits = ev.hits || 0;
          const errors = ev.errors || 0;
          const total = hits + errors;
          let percentage = total > 0 ? (hits / total) * 100 : 0;
          const color = getColorByPercentage(percentage);
          
          let eventText = ev.time ? `${ev.time} ${ev.title}` : ev.title;
          if (total > 0) {
            eventText += ` (${percentage.toFixed(0)}%)`;
          } else {
            eventText += ` (0%)`;
          }
          
          evDiv.textContent = eventText;
          evDiv.style.backgroundColor = color;
          // Ajuste contraste para amarelo
          if (percentage >= 70 && percentage <= 74.99) {
            evDiv.style.color = '#1e1e1e';
            evDiv.style.textShadow = 'none';
          } else {
            evDiv.style.color = '#fff';
          }
          
          evDiv.title = `Editar: ${ev.title} | Acertos: ${hits} | Erros: ${errors} | Percentual: ${percentage.toFixed(1)}%`;
          evDiv.onclick = (e) => {
            e.stopPropagation();
            openModalForEdit(key, ev.id);
          };
          eventsContainer.appendChild(evDiv);
        });
      }

      cell.appendChild(eventsContainer);
      cell.onclick = (e) => {
        if (e.target === cell || e.target.classList.contains('cell') || e.target === dateSpan || e.target === eventsContainer) {
          openModalForAdd(key);
        }
      };
      gridEl.appendChild(cell);
    }

    // completar grid
    const currentCells = gridEl.children.length;
    const remaining = (7 - (currentCells % 7)) % 7;
    for (let i = 0; i < remaining; i++) {
      const filler = document.createElement('div');
      filler.className = 'cell';
      filler.style.opacity = '0.2';
      gridEl.appendChild(filler);
    }

    updateGlobalPerformanceBanner();
  }

  // ====================== MODAL ======================
  function openModalForAdd(dateKey) {
    selectedDateKey = dateKey;
    editingEventId = null;
    modalTitle.textContent = '➕ Adicionar Evento de Estudo';
    evTitle.value = '';
    evTime.value = '';
    evHits.value = '0';
    evErrors.value = '0';
    deleteBtn.style.display = 'none';
    updatePercentageDisplay();
    modalBack.style.display = 'flex';
  }

  function openModalForEdit(dateKey, eventId) {
    const eventsMap = loadEvents();
    const dayEvents = eventsMap[dateKey] || [];
    const eventToEdit = dayEvents.find(ev => ev.id === eventId);
    if (!eventToEdit) return;

    selectedDateKey = dateKey;
    editingEventId = eventId;
    modalTitle.textContent = '✏️ Editar Evento de Estudo';
    evTitle.value = eventToEdit.title;
    evTime.value = eventToEdit.time || '';
    evHits.value = eventToEdit.hits || 0;
    evErrors.value = eventToEdit.errors || 0;
    deleteBtn.style.display = 'inline-block';
    updatePercentageDisplay();
    modalBack.style.display = 'flex';
  }

  function closeModal() {
    modalBack.style.display = 'none';
    selectedDateKey = null;
    editingEventId = null;
  }

  function saveEventHandler() {
    const title = evTitle.value.trim();
    if (!title) {
      alert('Por favor, informe um título para o evento.');
      return;
    }

    const hits = parseInt(evHits.value) || 0;
    const errors = parseInt(evErrors.value) || 0;

    const eventsMap = loadEvents();
    const dayEvents = eventsMap[selectedDateKey] || [];

    if (editingEventId) {
      const target = dayEvents.find(ev => ev.id === editingEventId);
      if (target) {
        target.title = title;
        target.time = evTime.value;
        target.hits = hits;
        target.errors = errors;
      } else {
        alert('Evento não encontrado para edição.');
        closeModal();
        return;
      }
    } else {
      const newId = Date.now();
      dayEvents.push({
        id: newId,
        title: title,
        time: evTime.value,
        hits: hits,
        errors: errors
      });
    }

    eventsMap[selectedDateKey] = dayEvents;
    saveEvents(eventsMap);
    closeModal();
    render();
  }

  function deleteEventHandler() {
    if (!editingEventId) return;
    if (!confirm('Tem certeza que deseja excluir este evento?')) return;

    const eventsMap = loadEvents();
    const dayEvents = eventsMap[selectedDateKey] || [];
    const index = dayEvents.findIndex(ev => ev.id === editingEventId);
    if (index !== -1) {
      dayEvents.splice(index, 1);
      if (dayEvents.length === 0) {
        delete eventsMap[selectedDateKey];
      } else {
        eventsMap[selectedDateKey] = dayEvents;
      }
      saveEvents(eventsMap);
    }
    closeModal();
    render();
  }

  // ====================== IMPORTAR/EXPORTAR ======================
  function importFromJSON(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const importedData = JSON.parse(e.target.result);
        if (typeof importedData === 'object' && importedData !== null) {
          saveEvents(importedData);
          render();
          alert('✅ Importação concluída!');
        } else {
          throw new Error('Formato inválido');
        }
      } catch (err) {
        alert('❌ Arquivo inválido. Use um JSON gerado pelo calendário.');
      }
    };
    reader.readAsText(file);
  }

  importBtn.addEventListener('click', () => {
    importFile.click();
  });
  importFile.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
      importFromJSON(e.target.files[0]);
    }
    importFile.value = '';
  });

  // ====================== EVENTOS DOS BOTÕES ======================
  document.getElementById('prev').onclick = () => {
    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
    render();
  };
  document.getElementById('next').onclick = () => {
    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
    render();
  };
  document.getElementById('today').onclick = () => {
    currentDate = new Date();
    render();
  };
  document.getElementById('export').onclick = () => {
    const data = localStorage.getItem('calEvents') || '{}';
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `estudos_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  saveBtn.onclick = saveEventHandler;
  cancelBtn.onclick = closeModal;
  deleteBtn.onclick = deleteEventHandler;

  evHits.addEventListener('input', updatePercentageDisplay);
  evErrors.addEventListener('input', updatePercentageDisplay);

  modalBack.onclick = (e) => {
    if (e.target === modalBack) closeModal();
  };

  // ====================== INICIALIZAÇÃO ======================
  weekdays.forEach(day => {
    const el = document.createElement('div');
    el.className = 'weekday';
    el.textContent = day;
    weekdaysRow.appendChild(el);
  });

  initTheme();
  render();
</script>
</body>
</html>
